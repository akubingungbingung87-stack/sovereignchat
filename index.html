<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sovereign Elite V50</title>
    <style>
        :root {
            --primary: #00ffa3;
            --bg: #0b0d11;
            --card: #161b22;
            --border: #30363d;
            --danger: #f85149;
            --warning: #f0883e;
            --msg-sent: #005c4b;
            --msg-rec: #21262d;
            --text-main: #c9d1d9;
            --text-gray: #8b949e;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .page { display: none; width: 100%; height: 100vh; flex-direction: column; position: absolute; inset: 0; }
        .active-page { display: flex !important; }

        .card {
            background-color: var(--card);
            padding: 25px;
            border-radius: 16px;
            width: 85%;
            max-width: 350px;
            border: 1px solid var(--border);
            text-align: center;
            margin: auto;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: #0d1117;
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            background-color: var(--primary);
            color: #000;
        }

        header {
            background-color: var(--card);
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
        }

        #chatBox {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background-color: #0d1117;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            max-width: 75%;
            position: relative;
        }

        .sent { align-self: flex-end; background-color: var(--msg-sent); border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background-color: var(--msg-rec); border-bottom-left-radius: 2px; }
        
        .msg-time { font-size: 10px; opacity: 0.5; text-align: right; margin-top: 4px; }

        #sidebar {
            position: fixed;
            right: -310px;
            top: 0;
            width: 300px;
            height: 100%;
            background-color: var(--card);
            z-index: 4000;
            transition: 0.3s ease-in-out;
            padding: 20px;
            border-left: 1px solid var(--border);
            box-sizing: border-box;
        }

        #sidebar.active { right: 0; }

        .close-sidebar {
            text-align: right;
            font-size: 28px;
            cursor: pointer;
            color: var(--text-gray);
            margin-bottom: 10px;
        }

        .admin-item {
            background-color: #0d1117;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .badge-owner {
            background: var(--primary);
            color: #000;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 4px;
            margin-left: 5px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="pageLogin" class="page active-page">
        <div class="card" id="loginForm">
            <h1 style="color: var(--primary)">SOVEREIGN</h1>
            <p style="font-size: 12px; color: var(--text-gray); margin-bottom: 15px;">Login: <b>SovereignChat</b></p>
            <input id="loginUsn" placeholder="Username">
            <input id="loginPass" type="password" placeholder="Password">
            <button class="btn" onclick="startLogin()">MASUK</button>
            <button onclick="clearData()" style="margin-top: 20px; background: none; border: none; color: var(--danger); font-size: 10px; cursor: pointer; text-decoration: underline;">RESET SEMUA DATA</button>
        </div>
    </div>

    <div id="pageDashboard" class="page">
        <header><b>Sovereign Chat</b><span onclick="toggleSidebar()" style="cursor:pointer; font-size: 24px;">☰</span></header>
        <div id="contactList" style="flex:1; overflow-y:auto; padding:15px;"></div>
    </div>

    <div id="pageChat" class="page">
        <header>
            <span onclick="showPage('pageDashboard')" style="cursor:pointer;">❮</span>
            <div><b id="chatTitle">User</b><br><small id="chatStatus"></small></div>
            <span></span>
        </header>
        <div id="chatBox"></div>
        <div style="background-color: var(--card); padding: 12px; display: flex; gap: 10px;">
            <input id="msgIn" placeholder="Pesan..." style="flex: 1; margin: 0;">
            <button class="btn" style="width: auto; padding: 0 20px;" onclick="sendChat()">➤</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="close-sidebar" onclick="toggleSidebar()">✕</div>
        <h2 id="sideUsn">USER</h2>
        <button id="ownerBtn" class="btn" style="display:none; background-color: #fff; color: #000; margin-bottom: 20px;" onclick="openAdmin()">🛡️ OWNER PANEL</button>
        <div style="border-top:1px solid var(--border); padding-top:20px;">
            <small style="color: var(--text-gray)">TAMBAH KONTAK</small>
            <input id="targetInp" placeholder="Input username...">
            <button class="btn" onclick="addTarget()">TAMBAH</button>
        </div>
        <button class="btn" style="background-color: var(--danger); color: #fff; margin-top: 60px;" onclick="location.reload()">LOGOUT</button>
    </div>

    <div id="adminPanel" style="position:fixed; inset:0; background-color: var(--bg); z-index: 5000; display:none; flex-direction:column;">
        <header><b>OWNER CONTROLS</b><span onclick="document.getElementById('adminPanel').style.display='none'" style="cursor:pointer; font-size:24px;">✕</span></header>
        <div style="padding: 20px; overflow-y: auto; flex: 1;">
            <div class="admin-item">
                <h4 style="margin-top:0; color:var(--primary)">BUAT AKUN</h4>
                <input id="newUsn" placeholder="Username">
                <input id="newPass" type="password" placeholder="Password">
                <select id="newRole">
                    <option value="user">User Biasa</option>
                    <option value="owner">Owner (Admin)</option>
                </select>
                <button class="btn" onclick="adminCreateAccount()">SIMPAN</button>
            </div>
            <h4>DAFTAR PENGGUNA</h4>
            <div id="adminUserList"></div>
        </div>
    </div>

    <script>
        let users = [], messages = [], currentUser = null, activeTarget = null;

        window.onload = () => {
            loadDB();
            
            // Konfigurasi Owner wajib sesuai request
            const masterUsn = "SovereignChat"; 
            const masterPass = "admin#123.soveirgn.!!";
            
            // Cari apakah sudah ada akun dengan nama tersebut
            let ownerAccount = users.find(u => u.usn === masterUsn);
            
            if (!ownerAccount) {
                // Jika tidak ada, buat baru
                users.push({ usn: masterUsn, pass: masterPass, role: 'owner', contacts: [], lastSeen: Date.now() });
                save();
            } else {
                // Jika ada tapi password beda, paksa perbarui agar sesuai request
                ownerAccount.pass = masterPass;
                ownerAccount.role = 'owner';
                save();
            }

            showPage('pageLogin');
            setInterval(() => { if(currentUser) { currentUser.lastSeen = Date.now(); save(); } }, 3000);
        };

        function loadDB() {
            users = JSON.parse(localStorage.getItem('v50_u')) || [];
            messages = JSON.parse(localStorage.getItem('v50_m')) || [];
        }

        function save() {
            localStorage.setItem('v50_u', JSON.stringify(users));
            localStorage.setItem('v50_m', JSON.stringify(messages));
        }

        function clearData() {
            if(confirm("PERINGATAN: Ini akan menghapus semua chat dan akun! Lanjutkan?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function startLogin() {
            const u = document.getElementById('loginUsn').value.trim();
            const p = document.getElementById('loginPass').value;
            
            // Login sangat ketat terhadap huruf besar/kecil (Case Sensitive)
            const user = users.find(x => x.usn === u && x.pass === p);
            
            if(!user) {
                alert("Gagal! Periksa kembali Username (Huruf Besar/Kecil) dan Password Anda.");
                return;
            }
            
            loginOk(user);
        }

        function loginOk(u) {
            currentUser = u;
            document.getElementById('sideUsn').innerHTML = u.usn + (u.role === 'owner' ? ' <span class="badge-owner">OWNER</span>' : '');
            if(u.role === 'owner') document.getElementById('ownerBtn').style.display = 'block';
            showPage('pageDashboard'); renderContacts();
            setInterval(renderChat, 2000);
        }

        function renderContacts() {
            const list = document.getElementById('contactList'); list.innerHTML = '';
            currentUser.contacts.forEach(c => {
                list.innerHTML += `<div onclick="activeTarget='${c}'; document.getElementById('chatTitle').innerText='${c}'; showPage('pageChat'); renderChat();" style="background:var(--card); padding:15px; border-radius:12px; margin-bottom:10px; border:1px solid var(--border); cursor:pointer;">👤 ${c}</div>`;
            });
        }

        function renderChat() {
            const box = document.getElementById('chatBox'); if(!box || !activeTarget) return;
            box.innerHTML = messages.filter(m => (m.f === currentUser.usn && m.t === activeTarget) || (m.f === activeTarget && m.t === currentUser.usn))
            .map(m => `<div class="bubble ${m.f === currentUser.usn ? 'sent' : 'received'}">${m.text}<div class="msg-time">${m.time}</div></div>`).join('');
            box.scrollTop = box.scrollHeight;
        }

        function sendChat() {
            const input = document.getElementById('msgIn'), text = input.value.trim();
            if(!text || !activeTarget) return;
            messages.push({ f: currentUser.usn, t: activeTarget, text: text, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) });
            input.value = ''; save(); renderChat();
        }

        function addTarget() {
            const v = document.getElementById('targetInp').value.trim();
            if(!users.some(u => u.usn === v)) return alert("User tidak ditemukan!");
            if(!currentUser.contacts.includes(v)) { 
                currentUser.contacts.push(v); 
                save(); renderContacts(); 
                document.getElementById('targetInp').value = '';
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }
        function showPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); 
            document.getElementById(id).classList.add('active-page'); 
        }
        function openAdmin() {
            document.getElementById('adminPanel').style.display = 'flex';
            const list = document.getElementById('adminUserList'); list.innerHTML = '';
            users.forEach(u => {
                list.innerHTML += `<div class="admin-item"><b>${u.usn}</b> [${u.role}]<br><small>Pass: ${u.pass}</small></div>`;
            });
        }
        function adminCreateAccount() {
            const u = document.getElementById('newUsn').value.trim(), p = document.getElementById('newPass').value, r = document.getElementById('newRole').value;
            if(users.some(x => x.usn === u)) return alert("Username sudah terpakai!");
            users.push({ usn: u, pass: p, role: r, contacts: [], lastSeen: Date.now() });
            save(); alert("Akun berhasil dibuat!"); openAdmin();
        }
    </script>
</body>
</html>
